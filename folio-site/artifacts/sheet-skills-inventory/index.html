<!-- Folio · slug: sheet-skills-inventory · kind: sheet · bundle: single-file · host: surge -->
<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Skills Inventory</title>
  <link rel='icon' href='data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%2032%2032%27%3E%3Crect%20width=%2732%27%20height=%2732%27%20rx=%276%27%20fill=%27%2345577d%27/%3E%3Cpath%20d=%27M7%2021l5-8%204%205%203-4%206%207%27%20fill=%27none%27%20stroke=%27white%27%20stroke-width=%272.5%27%20stroke-linecap=%27round%27%20stroke-linejoin=%27round%27/%3E%3C/svg%3E'>
  <style>
:root {
  --font-display: ui-serif, Georgia, "Iowan Old Style", serif;
  --font-body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --color-paper:    oklch(98% 0.006 90);
  --color-paper-2:  oklch(95% 0.008 90);
  --color-paper-3:  oklch(92% 0.010 90);
  --color-rule:     oklch(88% 0.010 90);
  --color-ink:      oklch(22% 0.020 80);
  --color-ink-2:    oklch(45% 0.012 80);
  --color-muted:    oklch(55% 0.010 80);
  --color-accent:   oklch(55% 0.180 245);
  --color-accent-2: oklch(58% 0.150 25);
  --color-accent-ink: oklch(99% 0.004 90);
  --color-focus:    oklch(55% 0.180 245);
  --color-success:  oklch(55% 0.140 150);
  --color-warn:     oklch(70% 0.150 75);
  --color-danger:   oklch(55% 0.200 25);

  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 24px; --space-6: 32px; --space-7: 48px; --space-8: 64px;

  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 14px; --radius-pill: 999px;
  --shadow-sm: 0 1px 2px oklch(22% 0.02 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(22% 0.02 80 / 0.10);
  --page-max: 1080px;
}

[data-theme="dark"] {
  --color-paper:    oklch(16% 0.008 80);
  --color-paper-2:  oklch(20% 0.010 80);
  --color-paper-3:  oklch(24% 0.012 80);
  --color-rule:     oklch(30% 0.012 80);
  --color-ink:      oklch(96% 0.005 90);
  --color-ink-2:    oklch(78% 0.010 80);
  --color-muted:    oklch(68% 0.010 80);
  --color-accent:   oklch(72% 0.150 245);
  --color-accent-2: oklch(72% 0.140 30);
  --color-accent-ink: oklch(16% 0.02 80);
  --color-focus:    oklch(74% 0.150 245);
  --color-success:  oklch(70% 0.130 150);
  --color-warn:     oklch(75% 0.140 75);
  --color-danger:   oklch(68% 0.190 25);
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.40);
  --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.50);
}
:root {
  --space-0: 0px;
  --line: 1px;
  --line-2: 2px;
  --measure: 65ch;
  --font--1: clamp(0.82rem, 0.78rem + 0.20vw, 0.94rem);
  --font-0: clamp(1rem, 0.95rem + 0.25vw, 1.12rem);
  --font-1: clamp(1.2rem, 1.08rem + 0.60vw, 1.5rem);
  --font-2: clamp(1.5rem, 1.2rem + 1.30vw, 2.2rem);
  --font-4: clamp(2.25rem, 1.65rem + 3vw, 3.8rem);
  --leading-tight: 1.12;
  --leading-body: 1.55;
  --tracking-tight: -0.02em;
  --tracking-wide: 0.06em;
  --weight-regular: 400;
  --weight-semibold: 650;
  --weight-bold: 760;
  --font-control: inherit;
  --background-empty: transparent;
  --color-current: currentColor;
  --table-min: 820px;
  --viewport-min: 100dvh;
}
html, body { margin: var(--space-0); min-height: var(--viewport-min); overflow-x: clip; }
body { background: var(--color-paper); color: var(--color-ink); font-family: var(--font-body); font-size: var(--font-0); line-height: var(--leading-body); }
.topbar { align-items: center; border-bottom: var(--line) solid var(--color-rule); display: flex; justify-content: space-between; padding: var(--space-4) var(--space-5); background: var(--color-paper); }
.brand { color: var(--color-muted); font-family: var(--font-mono); font-size: var(--font--1); letter-spacing: var(--tracking-wide); text-transform: uppercase; }
.theme-toggle { background: var(--color-paper-2); border: var(--line) solid var(--color-rule); border-radius: var(--radius-pill); box-shadow: var(--shadow-sm); color: var(--color-ink); cursor: pointer; font: var(--font-control); font-size: var(--font--1); font-weight: var(--weight-semibold); padding: var(--space-2) var(--space-3); }
.theme-toggle:focus-visible, button:focus-visible { outline: var(--line-2) solid var(--color-focus); outline-offset: var(--space-1); }
main { margin: var(--space-0) auto; max-width: var(--page-max); padding: var(--space-7) var(--space-5) var(--space-8); }
h1, h2, h3 { font-style: normal; line-height: var(--leading-tight); margin: var(--space-0); }
h1 { font-family: var(--font-display); font-size: var(--font-4); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
h2 { font-family: var(--font-display); font-size: var(--font-2); font-weight: var(--weight-bold); margin-top: var(--space-6); }
p { color: var(--color-ink-2); max-width: var(--measure); }
.summary { align-items: end; display: grid; gap: var(--space-5); grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); margin-top: var(--space-4); }
.metric { border-top: var(--line-2) solid var(--color-accent); padding-top: var(--space-3); }
.metric strong { display: block; font-family: var(--font-display); font-size: var(--font-2); line-height: var(--leading-tight); }
.metric span { color: var(--color-muted); font-size: var(--font--1); }
.table-wrap { background: var(--color-paper-2); border: var(--line) solid var(--color-rule); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-top: var(--space-5); overflow-x: auto; }
table { border-collapse: collapse; font-size: var(--font--1); min-width: var(--table-min); width: 100%; }
th, td { border-bottom: var(--line) solid var(--color-rule); padding: var(--space-3) var(--space-3); text-align: left; vertical-align: middle; }
th { background: var(--color-paper-3); color: var(--color-ink); font-weight: var(--weight-bold); }
th button { align-items: center; background: var(--background-empty); border: var(--space-0); color: var(--color-current); cursor: pointer; display: inline-flex; font: var(--font-control); font-weight: var(--weight-bold); gap: var(--space-1); padding: var(--space-0); }
th button::after { color: var(--color-muted); content: '↕'; font-size: var(--font--1); }
th[aria-sort='ascending'] button::after { color: var(--color-accent); content: '↑'; }
th[aria-sort='descending'] button::after { color: var(--color-accent); content: '↓'; }
td.num, tfoot td { font-variant-numeric: tabular-nums; }
tfoot td { background: var(--color-paper); color: var(--color-ink); font-weight: var(--weight-bold); }
.badge { align-items: center; display: inline-flex; gap: var(--space-2); white-space: nowrap; }
.dot { border-radius: var(--radius-pill); display: inline-block; height: var(--space-3); width: var(--space-3); }
.dot-established { background: var(--color-success); }
.dot-scaffold { background: var(--color-warn); }
.dot-seed { background: var(--color-muted); }
@media (max-width: 720px) { .topbar { padding: var(--space-3) var(--space-4); } main { padding: var(--space-6) var(--space-4); } .summary { grid-template-columns: minmax(0, 1fr); } }
  </style>
</head>
<body>
  <header class='topbar'>
    <div class='brand'>Folio sheet · local data</div>
    <button class='theme-toggle' type='button' data-theme-toggle aria-pressed='false'>Dark mode</button>
  </header>
  <main>
    <h1>Skills Inventory</h1>
    <p>Observed skill repository counts for four skills. Click any column header to sort; the summary row stays pinned to the table footer.</p>
    <section class='summary' aria-label='Inventory summary'>
      <div class='metric'><strong>4</strong><span>skills inventoried</span></div>
      <div class='metric'><strong>9,370</strong><span>total observed lines</span></div>
    </section>
    <div class='table-wrap'>
      <table>
        <thead>
          <tr>
            <th scope='col' data-key='skill' aria-sort='ascending'><button type='button'>Skill</button></th>
            <th scope='col' data-key='version'><button type='button'>Version</button></th>
            <th scope='col' data-key='skillLines'><button type='button'>SKILL.md Lines</button></th>
            <th scope='col' data-key='references'><button type='button'>References</button></th>
            <th scope='col' data-key='examples'><button type='button'>Examples</button></th>
            <th scope='col' data-key='totalFiles'><button type='button'>Total Files</button></th>
            <th scope='col' data-key='totalLines'><button type='button'>Total Lines</button></th>
            <th scope='col' data-key='maturity'><button type='button'>Maturity</button></th>
          </tr>
        </thead>
        <tbody id='rows'></tbody>
        <tfoot>
          <tr><td>Totals</td><td>—</td><td>1,001</td><td>91</td><td>6</td><td>213</td><td>9,370</td><td>4 skills</td></tr>
        </tfoot>
      </table>
    </div>
  </main>
  <script>
(function () {
  const root = document.documentElement;
  const key = 'folio-theme';
  const toggle = document.querySelector('[data-theme-toggle]');
  function getSaved() { try { return localStorage.getItem(key); } catch (error) { return null; } }
  function save(value) { try { localStorage.setItem(key, value); } catch (error) {} }
  const saved = getSaved();
  if (saved === 'dark' || saved === 'light') root.dataset.theme = saved;
  function sync() {
    const isDark = root.dataset.theme === 'dark';
    toggle.textContent = isDark ? 'Light mode' : 'Dark mode';
    toggle.setAttribute('aria-pressed', String(isDark));
  }
  toggle.addEventListener('click', function () {
    const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
    root.dataset.theme = next;
    save(next);
    sync();
  });
  sync();
})();
(function () {
  const rows = [
    { skill: 'anvil', version: '0.4.0', skillLines: 317, references: 53, examples: 5, totalFiles: 98, totalLines: 5896, maturity: 'established' },
    { skill: 'scribe', version: '0.3.1', skillLines: 290, references: 21, examples: 1, totalFiles: 94, totalLines: 1791, maturity: 'established' },
    { skill: 'folio', version: '0.2.0', skillLines: 276, references: 15, examples: 0, totalFiles: 17, totalLines: 1252, maturity: 'scaffold→v0.2' },
    { skill: 'prompt-mechanics', version: '0.1.0', skillLines: 118, references: 2, examples: 0, totalFiles: 4, totalLines: 431, maturity: 'seed' }
  ];
  const tbody = document.getElementById('rows');
  const headers = Array.from(document.querySelectorAll('th[data-key]'));
  const numeric = new Set(['skillLines', 'references', 'examples', 'totalFiles', 'totalLines']);
  let sortKey = 'skill';
  let direction = 1;
  const format = new Intl.NumberFormat('en-US');
  function dotClass(maturity) { return maturity === 'established' ? 'dot-established' : maturity === 'seed' ? 'dot-seed' : 'dot-scaffold'; }
  function render() {
    tbody.textContent = '';
    const sorted = rows.slice().sort(function (a, b) {
      const av = a[sortKey];
      const bv = b[sortKey];
      const result = numeric.has(sortKey) ? av - bv : String(av).localeCompare(String(bv));
      return result * direction;
    });
    sorted.forEach(function (row) {
      const tr = document.createElement('tr');
      ['skill', 'version', 'skillLines', 'references', 'examples', 'totalFiles', 'totalLines'].forEach(function (keyName) {
        const td = document.createElement('td');
        td.textContent = numeric.has(keyName) ? format.format(row[keyName]) : row[keyName];
        if (numeric.has(keyName)) td.className = 'num';
        tr.appendChild(td);
      });
      const maturity = document.createElement('td');
      const badge = document.createElement('span');
      const dot = document.createElement('span');
      badge.className = 'badge';
      dot.className = 'dot ' + dotClass(row.maturity);
      dot.setAttribute('aria-hidden', 'true');
      badge.append(dot, document.createTextNode(row.maturity));
      maturity.appendChild(badge);
      tr.appendChild(maturity);
      tbody.appendChild(tr);
    });
    headers.forEach(function (th) { th.setAttribute('aria-sort', th.dataset.key === sortKey ? (direction === 1 ? 'ascending' : 'descending') : 'none'); });
  }
  headers.forEach(function (th) {
    th.querySelector('button').addEventListener('click', function () {
      direction = th.dataset.key === sortKey ? direction * -1 : 1;
      sortKey = th.dataset.key;
      render();
    });
  });
  render();
})();
  </script>
</body>
</html>
