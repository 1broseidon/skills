<!-- Folio · template: slides · kind: slides · bundle: single-file · host: local -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}} · Folio slides template</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2345577d'/%3E%3Cpath d='M7 21l5-8 4 5 3-4 6 7' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root {
  --font-display: ui-serif, Georgia, "Iowan Old Style", serif;
  --font-body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --color-paper:    oklch(98% 0.006 90);
  --color-paper-2:  oklch(95% 0.008 90);
  --color-rule:     oklch(88% 0.010 90);
  --color-ink:      oklch(22% 0.020 80);
  --color-ink-2:    oklch(45% 0.012 80);
  --color-muted:    oklch(55% 0.010 80);
  --color-accent:   oklch(55% 0.180 245);
  --color-accent-ink: oklch(99% 0.004 90);
  --color-focus:    oklch(55% 0.180 245);

  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 24px; --space-6: 32px; --space-7: 48px;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 14px;
  --shadow-sm: 0 1px 2px oklch(22% 0.02 80 / 0.06);
  --page-max: 860px;
}

[data-theme="dark"] {
  --color-paper:    oklch(16% 0.008 80);
  --color-paper-2:  oklch(20% 0.010 80);
  --color-rule:     oklch(30% 0.012 80);
  --color-ink:      oklch(96% 0.005 90);
  --color-ink-2:    oklch(78% 0.010 80);
  --color-muted:    oklch(68% 0.010 80);
  --color-accent:   oklch(72% 0.150 245);
  --color-accent-ink: oklch(16% 0.02 80);
  --color-focus:    oklch(74% 0.150 245);
}
:root { --measure: 65ch; --border-thin: 1px; --type--1: clamp(0.875rem, 0.82rem + 0.2vw, 0.95rem); --type-0: clamp(1rem, 0.94rem + 0.3vw, 1.125rem); --type-1: clamp(1.5rem, 1.15rem + 1.6vw, 2.2rem); --type-2: clamp(2.4rem, 1.5rem + 4.5vw, 5rem); --slide-min: 100dvh; --leading-body: 1.5; --leading-tight: 1.08; --weight-bold: 700; }
* { box-sizing: border-box; }
html, body { overflow-x: clip; }
body { margin: 0; background: var(--color-paper); color: var(--color-ink); font-family: var(--font-body); font-size: var(--type-0); line-height: var(--leading-body); }
h1,h2,h3 { font-style: normal; }
h1, h2, h3 { font-family: var(--font-display); line-height: var(--leading-tight); }
p, li { max-width: var(--measure); }
.deck { min-height: var(--slide-min); }
.slide { display: none; min-height: var(--slide-min); padding: var(--space-7) var(--space-6); align-items: center; justify-content: flex-start; background: var(--color-paper); }
.slide.active { display: flex; }
.slide-inner { width: min(var(--page-max), 100%); }
.slide h1, .slide h2 { margin: 0 0 var(--space-4); font-size: var(--type-2); }
.slide p { color: var(--color-ink-2); font-size: var(--type-1); }
.counter { position: fixed; right: var(--space-4); bottom: var(--space-4); padding: var(--space-2) var(--space-3); border: var(--border-thin) solid var(--color-rule); border-radius: var(--radius-md); background: var(--color-paper-2); color: var(--color-muted); }
.theme-toggle { position: fixed; top: var(--space-4); right: var(--space-4); border: var(--border-thin) solid var(--color-rule); border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); background: var(--color-paper-2); color: var(--color-ink); font: inherit; }
.theme-toggle:focus-visible { outline: var(--border-thin) solid var(--color-focus); outline-offset: var(--space-1); }
@media (max-width: 560px) { .slide { padding: var(--space-7) var(--space-4); } }
</style>
</head>
<body>
<button class="theme-toggle" type="button" aria-pressed="false">Theme</button>
<main class="deck">
  <!-- Replace: slide 1 -->
  <section class="slide active"><div class="slide-inner"><h1>{{presentation title}}</h1><p>One-line promise for the audience.</p></div></section>
  <!-- Replace: slide 2 -->
  <section class="slide"><div class="slide-inner"><h2>{{main point}}</h2><p>One supporting line that keeps the slide focused.</p></div></section>
  <!-- Replace: slide 3 -->
  <section class="slide"><div class="slide-inner"><h2>{{evidence}}</h2><p>One line describing the proof, metric, or example.</p></div></section>
  <!-- Replace: slide 4 -->
  <section class="slide"><div class="slide-inner"><h2>{{next step}}</h2><p>One line with the decision or action requested.</p></div></section>
</main>
<div class="counter" aria-live="polite">1 / 4</div>
<script>
(() => {
  const root = document.documentElement;
  const button = document.querySelector('.theme-toggle');
  const read = () => { try { return localStorage.getItem('folio-theme'); } catch { return null; } };
  const write = value => { try { localStorage.setItem('folio-theme', value); } catch {} };
  const apply = value => { root.dataset.theme = value; button.setAttribute('aria-pressed', String(value === 'dark')); };
  apply(read() || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  button.addEventListener('click', () => { const next = root.dataset.theme === 'dark' ? 'light' : 'dark'; apply(next); write(next); });
  const slides = [...document.querySelectorAll('.slide')];
  const counter = document.querySelector('.counter');
  let index = 0;
  const show = next => { index = (next + slides.length) % slides.length; slides.forEach((slide, i) => slide.classList.toggle('active', i === index)); counter.textContent = `${index + 1} / ${slides.length}`; };
  addEventListener('keydown', event => { if (event.key === 'ArrowRight') show(index + 1); if (event.key === 'ArrowLeft') show(index - 1); });
})();
</script>
</body>
</html>
